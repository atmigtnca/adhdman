services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-ADHDman}
      APP_ENV: ${APP_ENV:-development}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/adhdman.sqlite}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
